<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小红书扫码发布助手</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f8;
        color: #18181b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }

      p {
        color: #52525b;
        line-height: 1.6;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        margin-top: 24px;
      }

      form,
      .result {
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 8px;
        padding: 20px;
      }

      label {
        display: block;
        margin: 0 0 14px;
        font-weight: 650;
      }

      input,
      textarea {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      button,
      a.button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #ff2442;
        color: #fff;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .secondary {
        background: #27272a;
      }

      .muted {
        color: #71717a;
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .qr {
        display: grid;
        place-items: center;
        min-height: 260px;
        border: 1px dashed #d4d4d8;
        border-radius: 8px;
        background: #fafafa;
        text-align: center;
      }

      .qr img {
        width: 220px;
        height: 220px;
      }

      .error {
        color: #b91c1c;
      }

      @media (max-width: 760px) {
        main {
          padding: 24px 0;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>小红书扫码发布助手</h1>
      <p>先验证最小闭环：创建图文任务，手机扫码打开发布页，尝试唤起小红书；失败时复制文案并保存图片手动发布。</p>

      <div class="layout">
        <form id="task-form">
          <label>
            标题
            <input name="title" required maxlength="80" placeholder="例如：小学数学口算练习资料整理" />
          </label>
          <label>
            正文
            <textarea name="content" required placeholder="输入正文、卖点、领取方式等"></textarea>
          </label>
          <label>
            图片 URL，一行一个
            <textarea name="images" placeholder="https://example.com/image-1.jpg"></textarea>
          </label>
          <label>
            话题，逗号分隔
            <input name="topics" placeholder="教辅资料, 小学数学, 学习资料" />
          </label>
          <label>
            API Token，可选，保存在当前浏览器
            <input name="apiToken" type="password" autocomplete="off" placeholder="Cloudflare 环境变量 API_TOKEN" />
          </label>
          <button type="submit">生成扫码发布页</button>
          <p id="message" class="muted"></p>
        </form>

        <section class="result" aria-live="polite">
          <h2>手机扫码</h2>
          <div id="qr" class="qr">
            <span class="muted">生成任务后显示二维码</span>
          </div>
          <div id="links" class="actions"></div>
          <p class="muted">二维码图片由公开 QR 服务生成，仅用于 MVP 验证。正式版可以替换为内置二维码生成。</p>
        </section>
      </div>
    </main>

    <script>
      const form = document.querySelector("#task-form");
      const message = document.querySelector("#message");
      const qr = document.querySelector("#qr");
      const links = document.querySelector("#links");
      const savedToken = localStorage.getItem("xhs_api_token");
      if (savedToken) form.elements.apiToken.value = savedToken;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "正在创建任务...";
        message.className = "muted";
        links.innerHTML = "";

        const data = new FormData(form);
        const payload = {
          title: data.get("title").trim(),
          content: data.get("content").trim(),
          images: data
            .get("images")
            .split("\n")
            .map((item) => item.trim())
            .filter(Boolean),
          topics: data
            .get("topics")
            .split(",")
            .map((item) => item.trim().replace(/^#/, ""))
            .filter(Boolean),
          source: "web"
        };
        const apiToken = data.get("apiToken").trim();
        if (apiToken) localStorage.setItem("xhs_api_token", apiToken);
        else localStorage.removeItem("xhs_api_token");

        try {
          const response = await fetch("/api/publish", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              ...(apiToken ? { authorization: `Bearer ${apiToken}` } : {})
            },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error || "创建失败");

          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(result.publishUrl)}`;
          qr.innerHTML = `<img alt="发布页二维码" src="${qrUrl}" />`;
          links.innerHTML = `
            <a class="button" href="${result.publishUrl}" target="_blank" rel="noreferrer">打开发布页</a>
            <button class="secondary" type="button" id="copy-link">复制链接</button>
          `;
          document.querySelector("#copy-link").addEventListener("click", async () => {
            await navigator.clipboard.writeText(result.publishUrl);
            message.textContent = "发布页链接已复制。";
          });
          message.textContent = `任务已创建，过期时间：${new Date(result.expiresAt).toLocaleString()}`;
        } catch (error) {
          message.textContent = error.message;
          message.className = "muted error";
          qr.innerHTML = '<span class="muted">生成失败</span>';
        }
      });
    </script>
  </body>
</html>
